gateway:
  host: "192.168.X.X"       # IP del servidor donde corre jota-gateway
  port: 8004
  path: "/ws/stream"
  client_key: "RELLENAR"    # client_key del dispositivo en el servidor
  connect_timeout_s: 10

oww:
  host: "127.0.0.1"         # OWW en el mismo dispositivo → localhost
  port: 10401
  wake_words:
    - "ok_nabu"
  reconnect_backoff_s: [5, 10, 20, 60]

audio:
  sample_rate: 16000
  channels: 1
  frames_per_buffer: 512
  preroll_seconds: 1.5
  silence_timeout_s: 1.5
  recording_timeout_s: 15.0
  vad_rms_threshold: 200

display:
  url: "http://127.0.0.1:8766"
  timeout_s: 2.0

hosts:
  - ip: "192.168.X.X"
    name: "mi-servidor"     # nombre del host en /etc/hosts del dispositivo
  - ip: "192.168.X.X"
    name: "mi-asistente"

phone:
  name: "mi-dispositivo"    # nombre único para identificar este teléfono

logging:
  level: "INFO"
